<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MelodyV3</title>
<style>
:root {
  --bg: #F5F5F7;
  --surface: rgba(255,255,255,.82);
  --card: #FFFFFF;
  --accent: #007AFF;
  --accent2: #409CFF;
  --accent-bg: rgba(0,122,255,.06);
  --accent-bg2: rgba(0,122,255,.12);
  --text: #1D1D1F;
  --text2: rgba(0,0,0,.50);
  --text3: rgba(0,0,0,.28);
  --border: rgba(0,0,0,.06);
  --hover: rgba(0,0,0,.03);
  --r: 10px;
  --rL: 14px;
}

[data-theme="dark"] {
  --bg: #121212;
  --surface: rgba(28,28,30,.92);
  --card: #1C1C1E;
  --accent: #0A84FF;
  --accent2: #409CFF;
  --accent-bg: rgba(10,132,255,.10);
  --accent-bg2: rgba(10,132,255,.18);
  --text: #F5F5F7;
  --text2: rgba(245,245,247,.60);
  --text3: rgba(245,245,247,.32);
  --border: rgba(255,255,255,.06);
  --hover: rgba(255,255,255,.05);
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,.08); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.15); }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); }

/* ═══ LAYOUT ═══ */
.app { flex:1; display:flex; overflow:hidden; min-height:0; }

.sidebar {
  width: 200px; flex-shrink: 0;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 10px 16px;
  z-index: 10;
}

.content {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; min-width:0;
}

/* ═══ SIDEBAR ═══ */
.sb-brand {
  padding: 0 14px 18px;
  font-size: 18px; font-weight: 700;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.sb-brand svg { width: 22px; height: 22px; }

.sb-search { padding: 0 6px; margin-bottom: 14px; }
.sb-search input {
  width: 100%; padding: 9px 14px;
  border: none; border-radius: var(--r);
  background: var(--hover); color: var(--text);
  font-family: inherit; font-size: 13px; outline: none;
  transition: all .2s;
}
.sb-search input::placeholder { color: var(--text3); }
.sb-search input:focus {
  background: var(--card);
  box-shadow: 0 0 0 2px var(--accent-bg2);
}

.sb-label {
  padding: 0 14px; margin: 14px 0 6px;
  font-size: 11px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: .5px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 10px;
  cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text2);
  transition: background .2s, color .2s;
}
.nav-item:hover { background: var(--hover); color: var(--text); }
.nav-item.active { background: var(--accent-bg2); color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity:.6; }
.nav-item.active svg { opacity: 1; }
.nav-item .badge {
  font-size: 10px; background: var(--accent); color: #fff;
  border-radius: 10px; padding: 1px 7px; margin-left: auto; font-weight: 600;
}

/* source pills */
.source-pills { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 6px; }
.source-pill {
  padding: 5px 11px; border-radius: 16px;
  font-size: 11px; font-weight: 600;
  background: var(--hover); color: var(--text2);
  cursor: pointer; border: none; font-family: inherit;
  transition: all .2s;
}
.source-pill:hover { background: var(--accent-bg2); color: var(--accent); }
.source-pill.active { background: var(--accent); color: #fff; }

/* ═══ PAGE HEAD ═══ */
.page-head {
  padding: 28px 32px 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.page-title { font-size: 24px; font-weight: 700; }
.page-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
.tbar { display: flex; gap: 6px; align-items: center; }
.tbtn {
  padding: 6px 14px; border: 1px solid var(--border);
  border-radius: 18px; background: var(--card);
  color: var(--text2); font-family: inherit;
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all .2s;
}
.tbtn:hover { background: var(--hover); color: var(--text); }
.tbtn.active { background: var(--accent-bg2); border-color: var(--accent); color: var(--accent); }

/* ═══ TRACK GRID ═══ */
.track-list { flex:1; overflow-y: auto; padding: 0 32px 32px; }
.track-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 20px;
}

.track-card {
  border-radius: var(--rL); padding: 12px;
  cursor: pointer;
  transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s, background .2s;
}
.track-card:hover {
  background: var(--hover);
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0,0,0,.07);
}

.cover-wrap {
  position: relative; width: 100%; aspect-ratio: 1;
  border-radius: 12px; overflow: hidden; margin-bottom: 10px;
  background: var(--border);
}
.cover-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .3s;
}
.track-card:hover .cover-wrap img { transform: scale(1.05); }

.cover-play {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.25); opacity: 0;
  transition: opacity .2s;
}
.track-card:hover .cover-play { opacity: 1; }
.cover-play svg { width: 36px; height: 36px; color: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,.3)); }

.track-card .title {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-card .artist {
  font-size: 12px; color: var(--text2); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.meta-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.source-tag {
  padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 600;
  background: var(--accent-bg); color: var(--accent);
}
.track-card .duration { font-size: 11px; color: var(--text3); margin-left: auto; }

.track-card.playing .cover-wrap { box-shadow: 0 0 0 3px var(--accent); }
.track-card.playing .title { color: var(--accent); }

/* list mode */
.track-list.list-mode .track-grid {
  grid-template-columns: 1fr; gap: 2px;
}
.track-list.list-mode .track-card {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px; border-radius: 8px;
}
.track-list.list-mode .cover-wrap {
  width: 44px; height: 44px; margin-bottom: 0; flex-shrink: 0;
}
.track-list.list-mode .cover-play { display: none; }
.track-list.list-mode .track-info { flex:1; min-width:0; }
.track-list.list-mode .track-extra {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}

/* empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 14px; color: var(--text3);
}
.empty-state svg { width: 56px; height: 56px; opacity: .15; }
.empty-state .text { font-size: 15px; font-weight: 500; }
.empty-state .subtext { font-size: 13px; opacity: .7; }

/* ═══ PLAYER BAR ═══ */
.player-bar {
  flex-shrink: 0; background: var(--card);
  border-top: 1px solid var(--border); z-index: 20;
}

.progress-bar {
  height: 3px; background: var(--border);
  cursor: pointer; position: relative; transition: height .15s;
}
.progress-bar:hover { height: 6px; }
.progress-fill {
  height: 100%; background: var(--accent);
  position: relative; transition: width .1s linear;
}
.progress-fill::after {
  content: ""; position: absolute; right: -7px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); opacity: 0; transition: opacity .15s;
  box-shadow: 0 0 8px var(--accent-bg2);
}
.progress-bar:hover .progress-fill::after { opacity: 1; }

.player-content {
  padding: 0 24px; height: 80px;
  display: flex; align-items: center; gap: 16px;
}

.song-info { min-width: 0; width: 260px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
.song-cover {
  width: 56px; height: 56px; border-radius: 10px;
  object-fit: cover; flex-shrink: 0;
  background: var(--border);
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
  transition: transform .2s;
  cursor: pointer;
}
.song-cover:hover { transform: scale(1.08); }
.song-cover-placeholder {
  width: 56px; height: 56px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent-bg), rgba(0,122,255,.02));
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); opacity: .5; flex-shrink: 0;
}
.song-cover-placeholder svg { width: 24px; height: 24px; }
.song-text { min-width:0; }
.song-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.song-time { font-size: 11px; color: var(--text3); margin-top: 2px; font-variant-numeric: tabular-nums; }

.controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

.ctrl-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: transparent; color: var(--text2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.ctrl-btn:hover { color: var(--text); background: var(--hover); }
.ctrl-btn:disabled { opacity: .3; cursor: not-allowed; }
.ctrl-btn svg { width: 18px; height: 18px; }

.play-btn {
  width: 44px; height: 44px;
  background: var(--accent); color: #fff; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 2px 12px rgba(0,122,255,.3);
}
.play-btn:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,122,255,.4); }
.play-btn:active { transform: scale(.95); }
.play-btn svg { width: 22px; height: 22px; }
.play-btn.playing { animation: breathe 2.5s ease-in-out infinite; }

.extra-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }

.speed-badge {
  font-size: 11px; font-weight: 600; color: var(--text3);
  cursor: pointer; padding: 4px 10px; border-radius: 6px;
  background: transparent; transition: all .2s;
}
.speed-badge:hover { color: var(--text); background: var(--hover); }
.speed-badge.active { color: var(--accent); background: var(--accent-bg); }

.volume-wrap { display: flex; align-items: center; gap: 8px; }
.volume-icon { cursor: pointer; color: var(--text3); transition: color .2s; flex-shrink: 0; }
.volume-icon:hover { color: var(--text); }
.volume-icon.muted { color: var(--accent); }
.volume-icon svg { width: 16px; height: 16px; }
.volume-slider {
  -webkit-appearance: none; width: 80px; height: 3px;
  border-radius: 2px; background: var(--border); outline: none;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}

/* ═══ LYRIC PANEL (side) ═══ */
.lyric-panel {
  width: 340px; flex-shrink: 0;
  background: var(--card);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.lyric-head {
  padding: 16px 20px 12px; font-size: 14px; font-weight: 600;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.lyric-body {
  flex: 1; overflow-y: auto; padding: 24px 20px;
  text-align: center; scroll-behavior: smooth;
  mask: linear-gradient(transparent 0%, #000 12%, #000 88%, transparent 100%);
}
.lyric-line { padding: 10px 0; line-height: 2; }
.lyric-line .text {
  display: inline-block; font-weight: 400; color: var(--text3);
  transition: font-size .35s, font-weight .35s, color .35s;
}
.lyric-line.active .text {
  font-size: 18px; font-weight: 600; color: var(--accent);
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--progress,0%), var(--text3) var(--progress,0%), var(--text3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 8px var(--accent-bg2));
}
.lyric-line .translation { font-size: 12px; color: var(--text2); margin-top: 2px; }
.lyric-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 12px; color: var(--text3);
}
.lyric-empty svg { width: 40px; height: 40px; opacity: .15; }

/* ═══ IMMERSIVE LYRICS PAGE ═══ */
.immersive-lyrics {
  position: fixed; inset: 0; z-index: 1000;
  display: none; flex-direction: column;
  background: #000; color: #fff;
}
.immersive-lyrics.show { display: flex; }

.il-bg {
  position: absolute; inset: -80px;
  background-size: cover; background-position: center;
  filter: blur(100px) saturate(1.4) brightness(.12);
  transform: scale(1.3);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
.il-bg::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(10,132,255,.08) 0%, transparent 60%);
}
.il-bg::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.3) 0%, rgba(0,0,0,.55) 35%, rgba(0,0,0,.8) 100%);
}
@keyframes bgPulse { 0% { filter: blur(100px) saturate(1.3) brightness(.12); } 100% { filter: blur(100px) saturate(1.5) brightness(.15); } }

.il-header {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px; flex-shrink: 0;
}
.il-back {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.1); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.il-back:hover { background: rgba(255,255,255,.2); }
.il-back svg { width: 18px; height: 18px; }
.il-song-info { text-align: center; flex: 1; }
.il-title { font-size: 16px; font-weight: 600; }
.il-artist { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 2px; }
.il-actions { display: flex; gap: 6px; }
.il-action-btn {
  padding: 5px 10px; border-radius: 16px; border: none;
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.7);
  font-size: 11px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all .2s;
}
.il-action-btn:hover { background: rgba(255,255,255,.2); color: #fff; }
.il-action-btn.active { background: var(--accent); color: #fff; }

.il-body {
  position: relative; z-index: 1;
  flex: 1; overflow-y: auto; text-align: center;
  padding: 40px 10%; scroll-behavior: smooth;
  mask: linear-gradient(transparent 0%, #000 12%, #000 88%, transparent 100%);
}
.il-body::-webkit-scrollbar { width: 0; }

.il-body .lyric-line { padding: 16px 0; line-height: 2.4; transition: all .5s cubic-bezier(.4,0,.2,1); }
.il-body .lyric-line .text {
  color: rgba(255,255,255,.2); font-size: 22px;
  transition: all .5s cubic-bezier(.4,0,.2,1);
}
.il-body .lyric-line.active .text {
  font-weight: 800; font-size: 36px;
  color: #fff;
  text-shadow: 0 0 30px rgba(10,132,255,.5), 0 0 60px rgba(10,132,255,.3);
  animation: lyricFlyIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes lyricFlyIn {
  0% { opacity:0; transform:scale(0.6) translateY(30px); filter:blur(8px); }
  100% { opacity:1; transform:scale(1) translateY(0); filter:blur(0); }
}
.il-body .lyric-line .translation { font-size: 14px; color: rgba(255,255,255,.4); margin-top: 4px; }

.il-controls {
  position: relative; z-index: 1;
  flex-shrink: 0; padding: 16px 10% 32px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.il-progress {
  width: 100%; height: 4px; background: rgba(255,255,255,.12);
  cursor: pointer; position: relative; border-radius: 2px;
  transition: height .15s;
}
.il-progress:hover { height: 6px; }
.il-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  position: relative; transition: width .1s linear;
}
.il-progress-fill::after {
  content: ""; position: absolute; right: -6px; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; opacity: 0; transition: opacity .15s;
}
.il-progress:hover .il-progress-fill::after { opacity: 1; }
.il-btns { display: flex; align-items: center; gap: 28px; }
.il-btns .ctrl-btn { color: rgba(255,255,255,.7); width: 36px; height: 36px; }
.il-btns .ctrl-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
.il-btns .play-btn { width: 50px; height: 50px; }
.il-btns .play-btn svg { width: 24px; height: 24px; }

.il-canvas {
  position: absolute; inset: 0; pointer-events: none; opacity: .5; z-index: 0;
}

/* ═══ MENUS ═══ */
.context-menu, .speed-menu {
  position: fixed; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--rL);
  padding: 4px; z-index: 999; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.12); min-width: 160px;
}
.context-menu.show, .speed-menu.show { display: block; }
.menu-item {
  display: block; width: 100%; padding: 8px 16px;
  border: none; border-radius: 6px; background: transparent;
  color: var(--text2); font-family: inherit; font-size: 13px;
  cursor: pointer; text-align: left; transition: all .15s;
}
.menu-item:hover { background: var(--hover); color: var(--text); }
.menu-item.danger { color: #e74c3c; }
.menu-item.danger:hover { background: rgba(231,76,60,.1); }

/* ═══ TOAST ═══ */
.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,32,.9); backdrop-filter: blur(20px);
  color: #fff; padding: 10px 22px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
  opacity: 0; pointer-events: none; transition: all .3s; z-index: 999;
}
.toast.show { animation: toastIn .4s cubic-bezier(.34,1.56,.64,1) both; }

/* ═══ LOADING ═══ */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--text3); gap: 8px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 1s linear infinite;
}

/* ═══ ANIMATIONS ═══ */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes breathe { 0%,100% { box-shadow: 0 2px 12px rgba(0,122,255,.25); } 50% { box-shadow: 0 2px 28px rgba(0,122,255,.5); } }
@keyframes toastIn { 0% { transform: translateX(-50%) translateY(20px) scale(.85); opacity:0; } 60% { transform: translateX(-50%) translateY(-5px) scale(1.04); } 100% { transform: translateX(-50%) translateY(0) scale(1); opacity:1; } }
@keyframes coverPop { 0% { transform: scale(.85); opacity:.4; } 60% { transform: scale(1.04); } 100% { transform: scale(1); opacity:1; } }
@keyframes slideUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }

.track-row { animation: fadeIn .35s cubic-bezier(.34,1.56,.64,1) both; }
.track-row:nth-child(1) { animation-delay:.02s; }
.track-row:nth-child(2) { animation-delay:.04s; }
.track-row:nth-child(3) { animation-delay:.06s; }
.track-row:nth-child(4) { animation-delay:.08s; }
.track-row:nth-child(5) { animation-delay:.10s; }
.track-row:nth-child(6) { animation-delay:.12s; }
.track-row:nth-child(7) { animation-delay:.14s; }
.track-row:nth-child(8) { animation-delay:.16s; }
.track-row:nth-child(9) { animation-delay:.18s; }
.track-row:nth-child(10) { animation-delay:.20s; }

.song-cover.animate-in { animation: coverPop .5s cubic-bezier(.34,1.56,.64,1) both; }

  <button class="menu-item" onclick="App.setSpeed(1.25)">1.25x</button>
  <button class="menu-item" onclick="App.setSpeed(1.5)">1.5x</button>
  <button class="menu-item" onclick="App.setSpeed(2)">2x</button>

<script>
(function() {
"use strict";

var ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
var ICON_PAUSE = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
var MODE_LABELS = { seq:"顺序播放", loop:"列表循环", single:"单曲循环", shuffle:"随机播放" };
var MODE_ORDER = ["seq","loop","single","shuffle"];
var MODE_ICONS = {
  seq: '<path d="M3 6h14M3 12h14M3 18h14"/><path d="M17 6l4 6-4 6"/>',
  loop: '<path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
  single: '<path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="15.5" text-anchor="middle" font-size="8" fill="currentColor" stroke="none" font-weight="bold">1</text>',
  shuffle: '<path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>'
};
var SOURCE_LABELS = { kg:"酷狗", ne:"网易云", bl:"B站" };

var audio = document.getElementById("audio");
audio.volume = 0.8;

var state = {
  currentTab: "search", currentSource: "all", viewMode: "grid",
  searchResults: [], playlist: [], recent: [],
  currentSong: null, currentIndex: -1, isPlaying: false,
  mode: "loop", speed: 1, isMuted: false, prevVolume: 0.8,
  lyricLines: [], currentLyricIndex: -1,
  lyricVisible: true, lyricOffset: 0,
  lyricsOpen: false
};

function $(id) { return document.getElementById(id); }
function formatTime(s) { if (!s||!isFinite(s)) return "00:00"; var m=Math.floor(s/60); return String(m).padStart(2,"0")+":"+String(Math.floor(s%60)).padStart(2,"0"); }
function toast(msg) { var t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove("show")},2500); }
function escapeHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ═══ API ═══
function api(path, cb) {
  fetch(path).then(function(r) { return r.json(); }).then(function(d) { cb(null, d); }).catch(function(e) { cb(e); });
}
function postApi(path, data, cb) {
  fetch(path, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data) })
    .then(function(r) { return r.json(); }).then(function(d) { cb(null, d); }).catch(function(e) { cb(e); });
}

// ═══ THEME ═══
function initTheme() { applyTheme(localStorage.getItem("melody_theme") || "light"); }
function applyTheme(t) {
  if (t==="system") t = window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("melody_theme", t);
  var l=$("themeLabel"); if(l) l.textContent = t==="dark" ? "浅色模式" : "深色模式";
}
function toggleTheme() { applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); }

// ═══ COVER COLOR ═══
function extractCoverColor(url) {
  if (!url) return;
  var img = new Image(); img.crossOrigin = "anonymous";
  img.onload = function() {
    try {
      var c=document.createElement("canvas"), ctx=c.getContext("2d");
      c.width=64; c.height=64; ctx.drawImage(img,0,0,64,64);
      var d=ctx.getImageData(0,0,64,64).data, r=0,g=0,b=0,n=0;
      for(var i=0;i<d.length;i+=16){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
      r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
      var max=Math.max(r,g,b),min=Math.min(r,g,b);
      if(max===0||(max-min)/max<0.25) return;
      document.documentElement.style.setProperty("--accent","rgb("+r+","+g+","+b+")");
      document.documentElement.style.setProperty("--accent2","rgb("+Math.min(255,r+30)+","+Math.min(255,g+30)+","+Math.min(255,b+30)+")");
      document.documentElement.style.setProperty("--accent-bg","rgba("+r+","+g+","+b+",.06)");
      document.documentElement.style.setProperty("--accent-bg2","rgba("+r+","+g+","+b+",.12)");
    } catch(e){}
  };
  img.src = url;
}
function resetAccentColor() {
  ["--accent","--accent2","--accent-bg","--accent-bg2"].forEach(function(p){document.documentElement.style.removeProperty(p);});
}

// ═══ SEARCH HISTORY ═══
function getHistory() { try { return JSON.parse(localStorage.getItem("melody_search_history")||"[]"); } catch(e){return [];} }
function addHistory(kw) { if(!kw.trim())return; var h=getHistory().filter(function(h){return h!==kw}); h.unshift(kw); if(h.length>10)h=h.slice(0,10); localStorage.setItem("melody_search_history",JSON.stringify(h)); }
function renderHistory() {
  var c=$("trackList"), h=getHistory();
  if(!h.length){showEmptyState();return;}
  var html='<div style="padding:8px 0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;font-weight:600">搜索历史</span><button onclick="App.clearHistory()" style="border:none;background:none;color:var(--text3);font-size:12px;cursor:pointer">清空</button></div><div style="display:flex;flex-wrap:wrap;gap:8px">';
  h.forEach(function(k){html+='<span onclick="App.searchFromHistory(\''+k.replace(/'/g,"\\'")+'\')" style="padding:6px 14px;border-radius:16px;background:var(--hover);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s" onmouseover="this.style.background=\'var(--accent-bg2)\';this.style.color=\'var(--accent)\'" onmouseout="this.style.background=\'var(--hover)\';this.style.color=\'var(--text2)\'">'+escapeHtml(k)+'</span>';});
  html+='</div></div>';
  c.innerHTML=html;
}

// ═══ SEARCH ═══
var searchTimer;
function search(kw) {
  if(!kw.trim()){showEmptyState();return;}
  showLoading();
  var url="/api/search?keyword="+encodeURIComponent(kw);
  if(state.currentSource!=="all") url+="&source="+state.currentSource;
  api(url, function(err,songs){
    if(err){toast("搜索失败");showEmptyState();return;}
    state.searchResults=songs||[];
    renderTrackList(state.searchResults,"search");
    updatePageInfo("搜索结果",'搜索 "'+kw+'" 共 '+songs.length+" 首");
  });
}

// ═══ PLAYBACK ═══
function playSong(song,index,listType) {
  state.currentSong=song; state.currentIndex=index;
  $("songName").textContent=song.title;
  $("songArtist").textContent=song.artist;
  if(song.cover){
    $("coverImg").src=song.cover; $("coverImg").style.display="block";
    $("coverPlaceholder").style.display="none";
    $("coverImg").classList.remove("animate-in");
    void $("coverImg").offsetWidth;
    $("coverImg").classList.add("animate-in");
    extractCoverColor(song.cover);
  } else {
    $("coverImg").style.display="none"; $("coverPlaceholder").style.display="flex";
    resetAccentColor();
  }
  document.querySelectorAll(".track-card").forEach(function(el){el.classList.toggle("playing",el.dataset.index==index&&el.dataset.type==listType);});
  toast("正在加载...");
  getSongURLWithFallback(song,function(err,url){
    if(err||!url){toast("获取播放链接失败");return;}
    var doPlay=function(){
      audio.src="/audio-proxy/?url="+encodeURIComponent(url);
      audio.playbackRate=state.speed;
      initWaveform();
      audio.play().then(function(){
        state.isPlaying=true; updatePlayButton(); fadeInAudio();
        toast("正在播放: "+song.title);
        addToRecent(song); loadLyricWithTranslation(song);
      }).catch(function(e){toast("播放失败");});
    };
    if(state.isPlaying&&!audio.paused) fadeOutAudio(doPlay); else doPlay();
  });
  document.querySelectorAll(".track-row").forEach(function(el){el.style.background="";});
  // highlight will be set on next render
  if(state.currentTab==="playlist")renderTrackList(state.playlist,"playlist");
  else if(state.currentTab==="search")renderTrackList(state.searchResults,"search");
  else if(state.currentTab==="recent")renderTrackList(state.recent,"recent");
  updateNavButtons();
}
function togglePlay() { if(!state.currentSong)return; if(audio.paused){audio.play();state.isPlaying=true;}else{audio.pause();state.isPlaying=false;} updatePlayButton(); }
function playPrev() { var l=getCurrentList(); if(!l.length)return; var i=state.currentIndex-1; if(i<0)i=l.length-1; playSong(l[i],i,state.currentTab); }
function playNext() {
  var l=getCurrentList(); if(!l.length)return;
  var i;
  if(state.mode==="single") i=state.currentIndex;
  else if(state.mode==="shuffle") i=Math.floor(Math.random()*l.length);
  else if(state.mode==="loop"){i=state.currentIndex+1;if(i>=l.length)i=0;}
  else{i=state.currentIndex+1;if(i>=l.length)return;}
  playSong(l[i],i,state.currentTab);
}
function skip(s){if(audio.src)audio.currentTime+=s;}
function getCurrentList(){switch(state.currentTab){case "search":return state.searchResults;case "playlist":return state.playlist;case "recent":return state.recent;default:return[];}}

// ═══ FALLBACK ═══
function getSongURLWithFallback(song,cb) {
  var sources=[song.source];["kg","ne","bl"].forEach(function(s){if(s!==song.source)sources.push(s);});
  var idx=0;
  function tryNext(){if(idx>=sources.length){cb(new Error("all failed"));return;}
    api("/api/song/url?id="+song.id+"&source="+sources[idx],function(e,d){if(!e&&d&&d.url)cb(null,d.url,sources[idx]);else{idx++;tryNext();}});}
  tryNext();
}

// ═══ FADE ═══
var fadeTimer=null;
function fadeOutAudio(cb) {
  if(!state.isPlaying||audio.paused){if(cb)cb();return;}
  var sv=audio.volume,st=15,tt=200/st,step=0;
  clearInterval(fadeTimer);
  fadeTimer=setInterval(function(){step++;audio.volume=sv*(1-step/st);if(step>=st){clearInterval(fadeTimer);audio.volume=0;if(cb)cb();}},tt);
}
function fadeInAudio(tv) {
  tv=tv||state.prevVolume||0.8; audio.volume=0;
  var st=15,tt=200/st,step=0;
  clearInterval(fadeTimer);
  fadeTimer=setInterval(function(){step++;audio.volume=tv*(step/st);if(step>=st){clearInterval(fadeTimer);audio.volume=tv;}},tt);
}

// ═══ LYRICS ═══
var translationLines=[], showTranslation=true;
function loadLyricWithTranslation(song) {

function parseLyric(text) {

// 从文字中采样粒子位置
function sampleTextPositions(text,dpr,w,h){
  if(!text)return[];
  var offscreen=document.createElement("canvas");
  var ctx=offscreen.getContext("2d");
  var fontSize=Math.min(60,Math.max(28,Math.floor(w/(text.length*0.7)/dpr)))*dpr;
  offscreen.width=w;offscreen.height=h;
  ctx.fillStyle="#fff";
  ctx.font="bold "+fontSize+"px -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(text,w/2,h/2);
  var imgData=ctx.getImageData(0,0,w,h).data;
  var positions=[];
  var step=Math.max(2,Math.floor(4/dpr));
  for(var y=0;y<h;y+=step*dpr){
    for(var x=0;x<w;x+=step*dpr){
      var idx=(y*w+x)*4;
      if(imgData[idx+3]>128){positions.push({x:x,y:y});}}
  }
  return positions;
}

// 文字粒子类
function createTextParticle(tx,ty,w,h){
  // 起始位置：从屏幕四周飞入
  var side=Math.floor(Math.random()*4);
  var sx,sy;
  if(side===0){sx=Math.random()*w;sy=-20;}          // 从上
  else if(side===1){sx=w+20;sy=Math.random()*h;}    // 从右
  else if(side===2){sx=Math.random()*w;sy=h+20;}    // 从下
  else{sx=-20;sy=Math.random()*h;}                   // 从左
  return{
    x:sx,y:sy,
    tx:tx,ty:ty,           // 目标位置
    vx:0,vy:0,
    r:Math.random()*2+1,
    life:0,maxLife:1,
    delay:Math.random()*200,  // 随机延迟
    startTime:Date.now(),
    phase:Math.random()*Math.PI*2,
    color:Math.random()>0.5?"rgba(10,132,255,":"rgba(64,156,255,"
  };
}

function drawILCanvas(){if(!ilCanvasCtx||!state.lyricsOpen)return;
if(analyser&&freqData)analyser.getByteFrequencyData(freqData);
var dpr=window.devicePixelRatio||1;
var w=ilCanvas.width=ilCanvas.parentElement.clientWidth*dpr;
var h=ilCanvas.height=ilCanvas.parentElement.clientHeight*dpr;
var ctx=ilCanvasCtx;ctx.clearRect(0,0,w,h);
var cx=w/2,cy=h*0.45,t=Date.now()*0.001;
var bass=0,mid=0;
if(analyser&&freqData){for(var i=0;i<8;i++)bass+=freqData[i];for(var i=8;i<32;i++)mid+=freqData[i];bass=bass/8/255;mid=mid/24/255;}

// ── 背景光晕 ──
var bgR=Math.min(w,h)*0.55;
var bg=ctx.createRadialGradient(cx,cy,0,cx,cy,bgR);
bg.addColorStop(0,"rgba(10,132,255,"+(0.12+bass*0.2)+")");
bg.addColorStop(0.4,"rgba(64,156,255,"+(0.04+bass*0.08)+")");
bg.addColorStop(1,"rgba(0,0,0,0)");
ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

// ── 极光条带 ──
var auroraBands=[{y:0.3,speed:0.2,amp:0.05,phase:0},{y:0.5,speed:0.3,amp:0.04,phase:2},{y:0.7,speed:0.25,amp:0.06,phase:4}];
for(var a=0;a<auroraBands.length;a++){var ab=auroraBands[a];ctx.save();var ay=ab.y*h+Math.sin(t*ab.speed+ab.phase)*h*ab.amp;var grad=ctx.createLinearGradient(0,ay-60*dpr,0,ay+60*dpr);var intensity=0.06+mid*0.15;grad.addColorStop(0,"rgba(10,132,255,0)");grad.addColorStop(0.3,"rgba(10,132,255,"+intensity+")");grad.addColorStop(0.5,"rgba(64,156,255,"+intensity*1.3+")");grad.addColorStop(0.7,"rgba(10,132,255,"+intensity+")");grad.addColorStop(1,"rgba(10,132,255,0)");ctx.fillStyle=grad;ctx.globalAlpha=0.35+bass*0.25;ctx.beginPath();ctx.moveTo(0,ay);for(var x=0;x<=w;x+=4*dpr){var fv=analyser&&freqData?freqData[Math.floor((x/w)*32)]/255:0.05;ctx.lineTo(x,ay+Math.sin(x*0.002+t*ab.speed+ab.phase)*20*dpr+fv*18*dpr*(a+1));}ctx.lineTo(w,ay+60*dpr);ctx.lineTo(0,ay+60*dpr);ctx.closePath();ctx.fill();ctx.restore();}

// ── 径向波纹 ──
for(var ring=0;ring<4;ring++){var baseR=(25+ring*30+bass*50)*dpr;ctx.save();ctx.beginPath();ctx.lineWidth=(2-ring*0.3)*dpr;ctx.globalAlpha=0.3-ring*0.05;ctx.shadowBlur=(12-ring*2)*dpr;ctx.shadowColor="rgba(10,132,255,0.4)";var rGrad=ctx.createRadialGradient(cx,cy,baseR-15*dpr,cx,cy,baseR+15*dpr);rGrad.addColorStop(0,"rgba(10,132,255,0)");rGrad.addColorStop(0.5,"rgba(64,156,255,0.4)");rGrad.addColorStop(1,"rgba(10,132,255,0)");ctx.strokeStyle=rGrad;var pts=80;for(var i=0;i<=pts;i++){var angle=(i/pts)*Math.PI*2;var fval=analyser&&freqData?freqData[Math.floor((i/pts)*32)]/255:0.05;var r=baseR+(fval+Math.sin(angle*(2+ring)+t*(0.8+ring*0.15))*0.3)*15*dpr;var px=cx+Math.cos(angle)*r;var py=cy+Math.sin(angle)*r;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.stroke();ctx.restore();}

// ── 背景粒子 ──
ctx.save();for(var i=0;i<bgParticles.length;i++){var p=bgParticles[i];var fval=analyser&&freqData?freqData[p.band]/255:0.05;p.vx+=(Math.random()-0.5)*0.001;p.vy+=(Math.random()-0.5)*0.001;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>1)p.vx*=-1;if(p.y<0||p.y>1)p.vy*=-1;var px=p.x*w;var py=p.y*h;var pr=(p.r+fval*1.5)*dpr;var alpha=0.08+fval*0.3;ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fillStyle="rgba(10,132,255,"+alpha+")";ctx.shadowBlur=4*dpr;ctx.shadowColor="rgba(10,132,255,"+alpha*0.6+")";ctx.fill();}ctx.restore();

// ── 文字粒子（核心效果）─ ──
var now=Date.now();
ctx.save();
for(var i=0;i<textParticles.length;i++){var p=textParticles[i];
  var elapsed=now-p.startTime;
  if(elapsed<p.delay)continue;
  var progress=Math.min(1,(elapsed-p.delay)/TEXT_ANIM_DURATION);
  // 弹性缓动
  var ease=1-Math.pow(1-progress,3)*Math.cos(progress*Math.PI*2*0.5);

// 粒子连线

for(var i=0;i<textParticles.length;i+=3){
  for(var j=i+3;j<Math.min(i+15,textParticles.length);j+=2){
    var dx=textParticles[i].x-textParticles[j].x;var dy=textParticles[i].y-textParticles[j].y;

    var text=state.lyricLines[state.currentLyricIndex].text;
    var positions=sampleTextPositions(text,dpr,w,h);
    // 采样后重新生成粒子
    var newParticles=[];
    var maxParticles=Math.min(positions.length,600);
    var step=Math.max(1,Math.floor(positions.length/maxParticles));
    for(var i=0;i<positions.length;i+=step){
      if(newParticles.length>=maxParticles)break;
      newParticles.push(createTextParticle(positions[i].x,positions[i].y,w,h));
    }
    textParticles=newParticles;
  }else{
    textParticles=[];
  }
}
}

var isDragging=false;
function onProgressMouseDown(e){isDragging=true;seekTo(e);}
function onProgressMouseMove(e){if(!isDragging)return;seekTo(e);}
function onProgressMouseUp(){isDragging=false;}
function seekTo(e){var bar=$("progressBar"),rect=bar.getBoundingClientRect();var p=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));if(audio.duration)audio.currentTime=p*audio.duration;}

// ═══ IMMERSIVE LYRICS ═══
function openLyrics(){
  state.lyricsOpen=true;
  var il=$("immersiveLyrics");
  if(state.currentSong){
    $("ilTitle").textContent=state.currentSong.title;
    $("ilArtist").textContent=state.currentSong.artist;
    var bg=$("ilBg");
    if(state.currentSong.cover)bg.style.backgroundImage="url("+state.currentSong.cover+")";
    else bg.style.backgroundImage="none";
  }
  renderImmersiveLyric();
  il.classList.add("show");
  // always init canvas
  if(!ilCanvas)initILCanvas();
  setTimeout(function(){if(ilCanvas){ilCanvas.width=il.parentElement.clientWidth*devicePixelRatio;ilCanvas.height=il.parentElement.clientHeight*devicePixelRatio;}},100);
}
function closeLyrics(){state.lyricsOpen=false;$("immersiveLyrics").classList.remove("show");}
function toggleLyricPanel(){state.lyricVisible=!state.lyricVisible;var p=$("lyricPanel"),b=$("btnLyric");if(state.lyricVisible){p.style.display="flex";}else{p.style.display="none";}if(b)b.classList.toggle("active",state.lyricVisible);}

// ═══ CONTEXT MENU ═══
function showContextMenu(e,song,idx,type){
  e.preventDefault();e.stopPropagation();
  var m=$("contextMenu");
  m.innerHTML='<button class="menu-item" onclick="App.ctxPlay()">▶ 播放</button><button class="menu-item" onclick="App.ctxPlayNext()">⏭ 下一首</button><button class="menu-item" onclick="App.ctxAdd()">❤ 添加到歌单</button><button class="menu-item" onclick="App.ctxCopy()">📋 复制歌名</button>';
  m.classList.add("show");m._song=song;m._idx=idx;m._type=type;
  m.style.left=Math.min(e.clientX,window.innerWidth-180)+"px";m.style.top=Math.min(e.clientY,window.innerHeight-160)+"px";
}
function hideContextMenu(){$("contextMenu").classList.remove("show");}
function ctxPlay(){var m=$("contextMenu");if(m._song)playSong(m._song,m._idx,m._type);hideContextMenu();}
function ctxPlayNext(){var m=$("contextMenu");if(m._song){getCurrentList().splice(state.currentIndex+1,0,m._song);toast("已添加到下一首");}hideContextMenu();}
function ctxAdd(){var m=$("contextMenu");if(m._song)addToPlaylist(m._song);hideContextMenu();}
function ctxCopy(){var m=$("contextMenu");if(m._song){var t=m._song.title+" - "+m._song.artist;if(navigator.clipboard)navigator.clipboard.writeText(t);toast("已复制: "+t);}hideContextMenu();}

// ═══ TAB ═══
function switchTab(tab){
  state.currentTab=tab;
  document.querySelectorAll(".nav-item[data-tab]").forEach(function(el){el.classList.toggle("active",el.dataset.tab===tab);});
  switch(tab){
    case "search":updatePageInfo("搜索音乐","搜索你喜欢的音乐");var kw=$("searchInput").value;if(kw)search(kw);else renderHistory();break;
    case "playlist":updatePageInfo("我的歌单",state.playlist.length+" 首歌曲");renderTrackList(state.playlist,"playlist");break;
    case "recent":updatePageInfo("最近播放",state.recent.length+" 首歌曲");renderTrackList(state.recent,"recent");break;
  }
}
function filterSource(src){
  state.currentSource=src;
  document.querySelectorAll(".source-pill").forEach(function(el){el.classList.toggle("active",el.dataset.source===src);});
  var kw=$("searchInput").value;
  if(kw&&state.currentTab==="search")search(kw);
}
function toggleViewMode(){state.viewMode=state.viewMode==="grid"?"list":"grid";var b=document.querySelector(".tbtn.view-toggle");if(b)b.textContent=state.viewMode==="grid"?"列表":"网格";if(state.currentTab==="search"&&state.searchResults.length)renderTrackList(state.searchResults,"search");}

// ═══ INIT ═══
function init(){
  initTheme();
  // toolbar
  $("toolbar").innerHTML='';

  $("searchInput").addEventListener("input",function(e){clearTimeout(searchTimer);searchTimer=setTimeout(function(){if(state.currentTab==="search"){if(e.target.value.trim())search(e.target.value);else renderHistory();}},300);});
  $("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&e.target.value.trim()){addHistory(e.target.value.trim());search(e.target.value);}});
  $("searchInput").addEventListener("focus",function(){if(!this.value.trim()&&state.currentTab==="search")renderHistory();});

  document.querySelectorAll(".nav-item[data-tab]").forEach(function(el){el.addEventListener("click",function(){switchTab(el.dataset.tab);});});
  document.querySelectorAll(".source-pill").forEach(function(el){el.addEventListener("click",function(e){e.preventDefault();filterSource(el.dataset.source);});});

  audio.addEventListener("timeupdate",updateProgress);
  audio.addEventListener("ended",function(){if(state.mode==="single"){audio.currentTime=0;audio.play();}else playNext();});
  audio.addEventListener("error",function(){toast("播放出错");state.isPlaying=false;updatePlayButton();});

  $("progressBar").addEventListener("mousedown",onProgressMouseDown);
  document.addEventListener("mousemove",onProgressMouseMove);
  document.addEventListener("mouseup",onProgressMouseUp);
  // immersive progress
  $("ilProgress").addEventListener("mousedown",function(e){isDragging=true;seekTo(e);});

  $("volumeSlider").addEventListener("input",function(e){setVolume(e.target.value/100);});

  document.addEventListener("click",function(e){if(!e.target.closest("#speedMenu")&&!e.target.closest("#speedBadge"))$("speedMenu").classList.remove("show");if(!e.target.closest("#contextMenu"))hideContextMenu();});

  document.addEventListener("keydown",function(e){
    if(e.target.tagName==="INPUT")return;
    switch(e.key){
      case " ":e.preventDefault();togglePlay();break;
      case "ArrowLeft":if(e.ctrlKey)playPrev();else skip(-5);break;
      case "ArrowRight":if(e.ctrlKey)playNext();else skip(5);break;
      case "ArrowUp":e.preventDefault();setVolume(Math.min(1,audio.volume+0.1));break;
      case "ArrowDown":e.preventDefault();setVolume(Math.max(0,audio.volume-0.1));break;
      case "m":case "M":toggleMute();break;
      case "l":case "L":toggleLyricPanel();break;
      case "f":case "F":if(state.lyricsOpen)closeLyrics();else openLyrics();break;
      case "Escape":closeLyrics();hideContextMenu();break;
    }
  });

  loadPlaylist();updateModeIcon();
  // 点击封面/歌曲信息区域打开全屏歌词
  var songInfoArea=$("songInfoArea");
  if(songInfoArea){songInfoArea.addEventListener("click",function(){openLyrics();});}
}

window.App={toggle:togglePlay,prev:playPrev,next:playNext,skip:skip,cycleMode:cycleMode,setSpeed:setSpeed,toggleSpeedMenu:toggleSpeedMenu,toggleMute:toggleMute,toggleLyricPanel:toggleLyricPanel,openLyrics:openLyrics,closeLyrics:closeLyrics,toggleTranslation:toggleTranslation,adjustLyricOffset:adjustLyricOffset,toggleTheme:toggleTheme,toggleView:toggleViewMode,searchFromHistory:function(kw){$("searchInput").value=kw;search(kw);},clearHistory:function(){localStorage.removeItem("melody_search_history");renderHistory();},ctxPlay:ctxPlay,ctxPlayNext:ctxPlayNext,ctxAdd:ctxAdd,ctxCopy:ctxCopy,addToPlaylist:function(i){var l=getCurrentList();if(l[i])addToPlaylist(l[i]);},removeFromPlaylist:removeFromPlaylist};

init();
})();
</script>
</body>
</html>
