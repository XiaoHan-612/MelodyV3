<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MelodyV3</title>
<style>
:root {
  --bg:#0A0E1A; --paper:#111620; --card:#161B28;
  --accent:#007AFF; --accent-rgb:0,122,255; --accent2:#409CFF;
  --text:#E8ECF0; --text2:rgba(255,255,255,.6); --text3:rgba(255,255,255,.3);
  --border:rgba(255,255,255,.06); --hover:rgba(255,255,255,.04);
  --r:10px; --rL:14px;
  --glass-bg:linear-gradient(135deg,rgba(20,26,40,.72),rgba(12,16,28,.78));
  --glass-border:rgba(0,122,255,.2);
  --glass-shadow:inset 0 0 2px 1px rgba(255,255,255,.2),inset 0 0 8px 3px rgba(255,255,255,.06),0 16px 48px rgba(0,0,0,.35);
  --accent-bg2:rgba(0,122,255,.12);
  --spring:cubic-bezier(.16,1,.3,1); --bounce:cubic-bezier(.34,1.56,.64,1); --smooth:cubic-bezier(.25,.1,.25,1);
}
[data-theme="light"] {
  --bg:#F5F5F7; --paper:#FFFFFF; --card:#FFFFFF;
  --accent:#007AFF; --accent-rgb:0,122,255; --accent2:#409CFF;
  --text:#1D1D1F; --text2:rgba(0,0,0,.5); --text3:rgba(0,0,0,.28);
  --border:rgba(0,0,0,.06); --hover:rgba(0,0,0,.04);
  --glass-bg:linear-gradient(135deg,rgba(255,255,255,.82),rgba(245,245,247,.78));
  --glass-border:rgba(0,122,255,.15);
  --glass-shadow:inset 0 0 2px 1px rgba(255,255,255,.5),inset 0 0 8px 3px rgba(255,255,255,.15),0 16px 48px rgba(0,0,0,.08);
  --accent-bg2:rgba(0,122,255,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;user-select:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.app{flex:1;display:flex;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 10px 16px;z-index:10}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sb-brand{padding:0 14px 18px;font-size:18px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px}
.sb-brand svg{width:22px;height:22px}
.sb-search{padding:0 6px;margin-bottom:14px}
.sb-search input{width:100%;padding:9px 14px;border:none;border-radius:var(--r);background:var(--hover);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:all .2s var(--smooth)}
.sb-search input::placeholder{color:var(--text3)}
.sb-search input:focus{background:var(--card);box-shadow:0 0 0 2px rgba(var(--accent-rgb),.15)}
.sb-label{padding:0 14px;margin:14px 0 6px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);position:relative;overflow:hidden;transition:color .25s var(--smooth),transform .15s var(--bounce),background .25s}
.nav-item:active{transform:scale(.97)}
.nav-item:hover{background:rgba(var(--accent-rgb),.06);color:var(--text)}
.nav-item.active{background:var(--accent-bg2);color:var(--accent)}
.nav-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 3px 3px 0;animation:navIndicator .3s var(--spring)}
@keyframes navIndicator{from{height:0;opacity:0}to{height:60%;opacity:1}}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.6}.nav-item.active svg{opacity:1}
.nav-item .badge{font-size:10px;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;margin-left:auto;font-weight:600}
.source-pills{display:flex;gap:5px;flex-wrap:wrap;padding:0 6px}
.source-pill{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;background:var(--hover);color:var(--text2);cursor:pointer;border:none;font-family:inherit;transition:all .25s var(--smooth)}
.source-pill:hover{background:rgba(var(--accent-rgb),.1);color:var(--accent);box-shadow:0 2px 12px rgba(var(--accent-rgb),.1)}
.source-pill:active{transform:scale(.95)}
.source-pill.active{background:var(--accent);color:#fff;box-shadow:0 2px 16px rgba(var(--accent-rgb),.3)}
.page-head{padding:28px 32px 12px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:24px;font-weight:700}.page-sub{font-size:12px;color:var(--text2);margin-top:4px}
.track-list{flex:1;overflow-y:auto;padding:0 32px 32px}
.track-row{display:grid;grid-template-columns:40px 1fr 80px 60px;padding:12px 16px;cursor:pointer;align-items:center;border-radius:8px;transition:background .15s var(--smooth),transform .1s var(--bounce)}
.track-row:hover{background:var(--hover)}.track-row:active{transform:scale(.998)}
.track-row.playing{background:rgba(var(--accent-rgb),.08)}.track-row.playing .tr-num{color:var(--accent);font-weight:700}.track-row.playing .tr-title{color:var(--accent);font-weight:700}
.tr-num{font-size:13px;color:var(--text3);text-align:center}
.tr-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-artist{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-tag{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(var(--accent-rgb),.08);color:var(--accent)}
.tr-dur{text-align:right;font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text3)}
.empty-state svg{width:56px;height:56px;opacity:.15}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:8px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.player-bar{flex-shrink:0;position:relative;z-index:20;margin:0 16px 12px;padding:14px 22px 16px;border-radius:24px;background:var(--glass-bg);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow)}
.progress-bar{height:3px;background:rgba(255,255,255,.06);cursor:pointer;position:relative;border-radius:2px;margin-bottom:12px;transition:height .2s var(--smooth)}
.progress-bar:hover{height:5px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;position:relative;transition:width .1s linear}
.progress-fill::after{content:"";position:absolute;right:-7px;top:50%;transform:translateY(-50%) scale(.5);width:14px;height:14px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s,transform .2s var(--bounce);box-shadow:0 0 8px rgba(var(--accent-rgb),.4)}
.progress-bar:hover .progress-fill::after{opacity:1;transform:translateY(-50%) scale(1)}
.progress-bar.dragging{height:6px}.progress-bar.dragging .progress-fill{background:var(--accent2)}
.player-content{display:flex;align-items:center;gap:16px}
.song-info{min-width:0;width:240px;display:flex;align-items:center;gap:12px;cursor:pointer}
.song-cover{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--border);box-shadow:0 2px 10px rgba(0,0,0,.2);transition:transform .25s var(--bounce),opacity .3s}
.song-cover:hover{transform:scale(1.06)}
.song-cover-placeholder{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,rgba(var(--accent-rgb),.08),rgba(var(--accent-rgb),.02));display:flex;align-items:center;justify-content:center;color:var(--accent);opacity:.5;flex-shrink:0}
.song-cover-placeholder svg{width:22px;height:22px}
.song-text{min-width:0}
.song-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-time{font-size:11px;color:var(--text3);margin-top:2px;font-variant-numeric:tabular-nums}
.controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ctrl-btn{width:36px;height:36px;border-radius:10px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--smooth)}
.ctrl-btn:hover{color:var(--text);background:rgba(255,255,255,.06);transform:translateY(-1px)}
.ctrl-btn:active{transform:scale(.94) translateY(0);transition-duration:.06s}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.ctrl-btn svg{width:18px;height:18px}
.play-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(var(--accent-rgb),.3);transition:transform .15s var(--bounce),box-shadow .25s}
.play-btn:hover{transform:scale(1.1);box-shadow:0 4px 20px rgba(var(--accent-rgb),.45)}
.play-btn:active{transform:scale(.93);transition-duration:.06s}
.play-btn.playing{animation:pulse-glow 2.5s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 2px 12px rgba(var(--accent-rgb),.3)}50%{box-shadow:0 2px 24px rgba(var(--accent-rgb),.55)}}
.play-btn svg{width:22px;height:22px}
.extra-controls{display:flex;align-items:center;gap:10px;margin-left:auto}
.speed-badge{font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;padding:4px 10px;border-radius:6px;transition:all .2s}
.speed-badge:hover{color:var(--text);background:var(--hover)}
.speed-badge.active{color:var(--accent);background:rgba(var(--accent-rgb),.08)}
.volume-wrap{display:flex;align-items:center;gap:8px}
.volume-icon{cursor:pointer;color:var(--text3);transition:color .2s;flex-shrink:0}
.volume-icon:hover{color:var(--text)}.volume-icon.muted{color:var(--accent)}
.volume-icon svg{width:16px;height:16px}
.volume-slider{-webkit-appearance:none;width:100px;height:3px;border-radius:2px;background:var(--border);outline:none}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .15s var(--bounce)}
.volume-slider::-webkit-slider-thumb:hover{transform:scale(1.3)}
.main-waveform{position:fixed;bottom:96px;left:16px;right:16px;height:60px;pointer-events:none;z-index:15}
.lyric-panel{width:340px;flex-shrink:0;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lyric-head{padding:16px 20px 12px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.lyric-body{flex:1;overflow-y:auto;padding:24px 20px;text-align:center;scroll-behavior:smooth;mask:linear-gradient(transparent 0%,#000 12%,#000 88%,transparent 100%)}
.lyric-line{padding:10px 0;line-height:2}
.lyric-line .text{display:inline-block;font-weight:400;color:var(--text3);transition:all .35s var(--spring)}
.lyric-line.active .text{font-size:18px;font-weight:600;color:var(--accent);filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),.2))}
.lyric-line .translation{font-size:12px;color:var(--text2);margin-top:2px}
.lyric-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)}
.lyric-empty svg{width:40px;height:40px;opacity:.15}
.immersive-lyrics{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;color:#fff;overflow:hidden;transition:background .5s}
.immersive-lyrics.show{display:flex}
[data-theme="light"] .immersive-lyrics{background:linear-gradient(180deg,#080C18 0%,#0E1828 50%,#080C18 100%)}
[data-theme="dark"] .immersive-lyrics{background:linear-gradient(180deg,#050810 0%,#0A1020 50%,#050810 100%)}
.il-bg{position:absolute;inset:-80px;background-size:cover;background-position:center;filter:blur(100px) saturate(1.4) brightness(.2);transform:scale(1.3);opacity:.55}
.il-bg::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(0,122,255,.1) 0%,transparent 60%)}
.il-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,.5) 40%,rgba(0,0,0,.75) 100%)}
.il-header{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:20px 32px;flex-shrink:0}
.il-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--smooth)}
.il-back:hover{background:rgba(255,255,255,.12)}
.il-back svg{width:18px;height:18px}
.il-song-info{text-align:center;flex:1}
.il-title{font-size:16px;font-weight:600}
.il-artist{font-size:13px;color:rgba(255,255,255,.45);margin-top:2px}
.il-actions{display:flex;gap:6px}
.il-action-btn{padding:5px 10px;border-radius:16px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s var(--smooth)}
.il-action-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.il-action-btn.active{background:var(--accent);color:#fff}

.il-body{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center}
.il-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}
.il-next{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);font-size:16px;color:rgba(255,255,255,.15);max-width:70%;text-align:center}

.il-controls{position:relative;z-index:3;flex-shrink:0;padding:12px 10% 28px;display:flex;flex-direction:column;align-items:center;gap:12px}
.il-progress{width:100%;height:3px;background:rgba(255,255,255,.06);cursor:pointer;position:relative;border-radius:2px;transition:height .2s}
.il-progress:hover{height:5px}
.il-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .1s linear}
.il-btns{display:flex;align-items:center;gap:28px}
.il-btns .ctrl-btn{color:rgba(255,255,255,.5);width:36px;height:36px}
.il-btns .ctrl-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.il-btns .play-btn{width:52px;height:52px}
.context-menu,.speed-menu{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:var(--rL);padding:4px;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,.2);min-width:160px}
.context-menu.show,.speed-menu.show{display:block}
.menu-item{display:block;width:100%;padding:8px 16px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;text-align:left;transition:all .15s}
.menu-item:hover{background:var(--hover);color:var(--text)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px) scale(.9);background:rgba(30,30,32,.9);backdrop-filter:blur(20px);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:all .3s var(--bounce);z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes coverPop{0%{transform:scale(.88);opacity:.5}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
.track-row{animation:fadeSlideUp .35s var(--spring) both}
.track-row:nth-child(1){animation-delay:.02s}.track-row:nth-child(2){animation-delay:.04s}.track-row:nth-child(3){animation-delay:.06s}.track-row:nth-child(4){animation-delay:.08s}.track-row:nth-child(5){animation-delay:.1s}
.track-row:nth-child(6){animation-delay:.12s}.track-row:nth-child(7){animation-delay:.14s}.track-row:nth-child(8){animation-delay:.16s}.track-row:nth-child(9){animation-delay:.18s}.track-row:nth-child(10){animation-delay:.2s}
.song-cover.animate-in{animation:coverPop .45s var(--bounce) both}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sb-brand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>MelodyV3</div>
    <div class="sb-search"><input id="searchInput" type="text" placeholder="搜索音乐..." autofocus></div>
    <div class="sb-label">发现</div>
    <div class="nav-item active" data-tab="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>搜索音乐</div>
    <div class="sb-label">我的音乐</div>
    <div class="nav-item" data-tab="playlist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>我的歌单 <span class="badge" id="playlistCount">0</span></div>
    <div class="nav-item" data-tab="recent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>最近播放</div>
    <div class="sb-label">来源</div>
    <div class="source-pills"><button class="source-pill active" data-source="all">全部</button><button class="source-pill" data-source="kg">酷狗</button><button class="source-pill" data-source="ne">网易云</button><button class="source-pill" data-source="bl">B站</button></div>
    <div style="flex:1"></div>
    <div class="nav-item" id="navTheme" onclick="App.toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg><span id="themeLabel">浅色模式</span></div>
  </nav>
  <main class="content">
    <div class="page-head"><div><div class="page-title" id="pageTitle">搜索音乐</div><div class="page-sub" id="pageSub">搜索你喜欢的音乐</div></div></div>
    <div class="track-list" id="trackList"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><div class="text">搜索你喜欢的音乐</div><div style="font-size:13px;opacity:.7">支持酷狗、网易云、B站三个平台</div></div></div>
  </main>
  <aside class="lyric-panel" id="lyricPanel">
    <div class="lyric-head"><span>歌词</span><div style="display:flex;gap:4px;align-items:center"><button class="ctrl-btn" onclick="App.toggleTranslation()" style="font-size:10px;width:auto;padding:0 6px" id="btnTranslation">译</button><button class="ctrl-btn" onclick="App.adjustLyricOffset(-0.5)" style="font-size:10px;width:auto;padding:0 6px">-0.5s</button><span id="lyricOffsetDisplay" style="font-size:10px;color:var(--text3);min-width:28px;text-align:center">0s</span><button class="ctrl-btn" onclick="App.adjustLyricOffset(0.5)" style="font-size:10px;width:auto;padding:0 6px">+0.5s</button><button class="ctrl-btn" onclick="App.openLyrics()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button><button class="ctrl-btn" onclick="App.toggleLyricPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div></div>
    <div class="lyric-body" id="lyricBody"><div class="lyric-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h12M4 18h8"/></svg><span>暂无歌词</span></div></div>
  </aside>
</div>
<div class="immersive-lyrics" id="immersiveLyrics">
  <div class="il-bg" id="ilBg"></div>
  <div class="il-header"><button class="il-back" onclick="App.closeLyrics()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button><div class="il-song-info"><div class="il-title" id="ilTitle">--</div><div class="il-artist" id="ilArtist">--</div></div><div class="il-actions"><button class="il-action-btn" id="ilTransBtn" onclick="App.toggleTranslation()">译</button><button class="il-action-btn" onclick="App.adjustLyricOffset(-0.5)">-0.5s</button><button class="il-action-btn" onclick="App.adjustLyricOffset(0.5)">+0.5s</button></div></div>
  <div class="il-body" id="ilBody">
    <canvas class="il-canvas" id="ilCanvas"></canvas>
  </div>
  <div class="il-controls"><div class="il-progress" id="ilProgress"><div class="il-progress-fill" id="ilProgressFill"></div></div><div class="il-btns"><button class="ctrl-btn" onclick="App.prev()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button><button class="play-btn" id="ilPlayBtn" onclick="App.toggle()"><svg viewBox="0 0 24 24" fill="currentColor" id="ilPlayIcon"><path d="M8 5v14l11-7z"/></svg></button><button class="ctrl-btn" onclick="App.next()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button></div></div>
</div>
<canvas class="main-waveform" id="mainWaveform"></canvas>
<footer class="player-bar">
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="player-content">
    <div class="song-info" id="songInfoArea"><div class="song-cover-placeholder" id="coverPlaceholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><img class="song-cover" id="coverImg" src="" style="display:none" onerror="this.style.display='none';document.getElementById('coverPlaceholder').style.display='flex'"><div class="song-text"><div class="song-name" id="songName">未在播放</div><div class="song-artist" id="songArtist">--</div><div class="song-time" id="timeDisplay">00:00 / 00:00</div></div></div>
    <div class="controls">
      <button class="ctrl-btn" onclick="App.skip(-10)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
      <button class="ctrl-btn" id="btnPrev" onclick="App.prev()" disabled><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button class="play-btn" id="btnPlay" onclick="App.toggle()"><svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="ctrl-btn" id="btnNext" onclick="App.next()" disabled><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      <button class="ctrl-btn" onclick="App.skip(10)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
      <button class="ctrl-btn" id="btnMode" onclick="App.cycleMode()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
    </div>
    <div class="extra-controls">
      <button class="ctrl-btn" id="btnLyric" onclick="App.toggleLyricPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 10h12M4 14h8M4 18h4"/></svg></button>
      <span class="speed-badge" id="speedBadge" onclick="App.toggleSpeedMenu()">1x</span>
      <div class="volume-wrap"><span class="volume-icon" id="volumeIcon" onclick="App.toggleMute()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></span><input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50"></div>
    </div>
  </div>
</footer>
<audio id="audio"></audio>
<div class="toast" id="toast"></div>
<div class="context-menu" id="contextMenu"></div>
<div class="speed-menu" id="speedMenu"><button class="menu-item" onclick="App.setSpeed(0.5)">0.5x</button><button class="menu-item" onclick="App.setSpeed(0.75)">0.75x</button><button class="menu-item active" onclick="App.setSpeed(1)">1x</button><button class="menu-item" onclick="App.setSpeed(1.25)">1.25x</button><button class="menu-item" onclick="App.setSpeed(1.5)">1.5x</button><button class="menu-item" onclick="App.setSpeed(2)">2x</button></div>
<script>
var ICON_PLAY='<path d="M8 5v14l11-7z"/>';
var ICON_PAUSE='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
var MODE_LABELS={seq:"顺序播放",loop:"列表循环",single:"单曲循环",shuffle:"随机播放"};
var MODE_ORDER=["seq","loop","single","shuffle"];
var MODE_ICONS={seq:'<path d="M3 6h14M3 12h14M3 18h14"/><path d="M17 6l4 6-4 6"/>',loop:'<path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',single:'<path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><circle cx="12" cy="14" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 14h3" stroke="currentColor" stroke-width="1.2"/>',shuffle:'<path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>'};
var SOURCE_LABELS={kg:"酷狗",ne:"网易云",bl:"B站"};
var audio=document.getElementById("audio");audio.volume=0.5;
var S={tab:"search",src:"all",results:[],pl:[],recent:[],song:null,idx:-1,play:false,mode:"loop",speed:1,muted:false,prevVol:0.5,lines:[],lyricIdx:-1,lyricVis:true,lyricOff:0,lyricsOpen:false};
function $(id){return document.getElementById(id)}
function fmt(s){if(!s||!isFinite(s))return"00:00";var m=Math.floor(s/60);return String(m).padStart(2,"0")+":"+String(Math.floor(s%60)).padStart(2,"0")}
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},2500)}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// API
function api(p,cb){fetch(p).then(function(r){return r.json()}).then(function(d){cb(null,d)}).catch(function(e){cb(e)})}
function postApi(p,d,cb){fetch(p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(function(r){return r.json()}).then(function(d2){cb(null,d2)}).catch(function(e){cb(e)})}

// Theme
function initTheme(){applyTheme(localStorage.getItem("melody_theme")||"light")}
function applyTheme(t){if(t==="system")t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);localStorage.setItem("melody_theme",t);var l=$("themeLabel");if(l)l.textContent=t==="dark"?"浅色模式":"深色模式"}
function toggleTheme(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark")}

// Cover color
function extractCover(u){if(!u)return;var img=new Image();img.crossOrigin="anonymous";img.onload=function(){try{var c=document.createElement("canvas"),x=c.getContext("2d");c.width=64;c.height=64;x.drawImage(img,0,0,64,64);var d=x.getImageData(0,0,64,64).data,r=0,g=0,b=0,n=0;for(var i=0;i<d.length;i+=16){r+=d[i];g+=d[i+1];b+=d[i+2];n++}r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);if(Math.max(r,g,b)===0)return;document.documentElement.style.setProperty("--accent","rgb("+r+","+g+","+b+")");document.documentElement.style.setProperty("--accent-rgb",r+","+g+","+b)}catch(e){}};img.src=u}
function resetAccent(){document.documentElement.style.setProperty("--accent","#007AFF");document.documentElement.style.setProperty("--accent-rgb","0,122,255")}

// Search history
function getHist(){try{return JSON.parse(localStorage.getItem("melody_sh")||"[]")}catch(e){return[]}}
function addHist(k){if(!k.trim())return;var h=getHist().filter(function(x){return x!==k});h.unshift(k);if(h.length>10)h=h.slice(0,10);localStorage.setItem("melody_sh",JSON.stringify(h))}
function renderHist(){var c=$("trackList"),h=getHist();if(!h.length){showEmpty();return}var html='<div style="padding:8px 0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;font-weight:600">搜索历史</span><button onclick="App.clearHist()" style="border:none;background:none;color:var(--text3);font-size:12px;cursor:pointer">清空</button></div><div style="display:flex;flex-wrap:wrap;gap:8px">';h.forEach(function(k){html+='<span onclick="App.searchHist(\''+k.replace(/'/g,"\\'")+'\')" style="padding:6px 14px;border-radius:16px;background:var(--hover);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s">'+esc(k)+'</span>'});html+='</div></div>';c.innerHTML=html}

// Search
var sTimer;function search(kw){if(!kw.trim()){showEmpty();return}showLoading();var u="/api/search?keyword="+encodeURIComponent(kw);if(S.src!=="all")u+="&source="+S.src;api(u,function(e,songs){if(e){toast("搜索失败");showEmpty();return}S.results=songs||[];renderList(S.results,"search");$("pageTitle").textContent="搜索结果";$("pageSub").textContent='搜索 "'+kw+'" 共 '+songs.length+" 首"})}

// Playback
function playSong(song,idx,type){
  S.song=song;S.idx=idx;
  $("songName").textContent=song.title;$("songArtist").textContent=song.artist;
  var cv=$("coverImg"),ph=$("coverPlaceholder");
  if(song.cover){cv.src=song.cover;cv.style.display="block";ph.style.display="none";cv.classList.remove("animate-in");void cv.offsetWidth;cv.classList.add("animate-in");extractCover(song.cover)}
  else{cv.style.display="none";ph.style.display="flex";resetAccent()}
  document.querySelectorAll(".track-row").forEach(function(el){el.classList.toggle("playing",el.dataset.index==idx&&el.dataset.type==type)});
  toast("正在加载...");
  fallback(song,function(e,u){
    if(e||!u){toast("获取播放链接失败");return}
    var go=function(){audio.src="/audio-proxy/?url="+encodeURIComponent(u);audio.playbackRate=S.speed;initWave();audio.play().then(function(){S.play=true;updatePlayBtn();fadeIn();toast("正在播放: "+song.title);addRecent(song);loadLyric(song)}).catch(function(er){toast("播放失败")})};
    if(S.play&&!audio.paused)fadeOut(go);else go()
  });
  $("btnPrev").disabled=!S.song;$("btnNext").disabled=!S.song
}
function togglePlay(){if(!S.song)return;if(audio.paused){audio.play();S.play=true}else{audio.pause();S.play=false}updatePlayBtn()}
function playPrev(){var l=curList();if(!l.length)return;var i=S.idx-1;if(i<0)i=l.length-1;playSong(l[i],i,S.tab)}
function playNext(){var l=curList();if(!l.length)return;var i;if(S.mode==="single")i=S.idx;else if(S.mode==="shuffle")i=Math.floor(Math.random()*l.length);else if(S.mode==="loop"){i=S.idx+1;if(i>=l.length)i=0}else{i=S.idx+1;if(i>=l.length)return}playSong(l[i],i,S.tab)}
function skip(s){if(audio.src)audio.currentTime+=s}
function curList(){switch(S.tab){case "search":return S.results;case "playlist":return S.pl;case "recent":return S.recent;default:return[]}}

// Fallback
function fallback(song,cb){var src=[song.source];["kg","ne","bl"].forEach(function(s){if(s!==song.source)src.push(s)});var i=0;(function next(){if(i>=src.length){cb(new Error("fail"));return}api("/api/song/url?id="+song.id+"&source="+src[i],function(e,d){if(!e&&d&&d.url)cb(null,d.url);else{i++;next()}})})()}

// Fade
var fTimer=null;
function fadeOut(cb){if(!S.play||audio.paused){if(cb)cb();return}var sv=audio.volume,st=15,tt=200/st,s=0;clearInterval(fTimer);fTimer=setInterval(function(){s++;audio.volume=sv*(1-s/st);if(s>=st){clearInterval(fTimer);audio.volume=0;if(cb)cb()}},tt)}
function fadeIn(v){v=v||S.prevVol||0.8;audio.volume=0;var st=15,tt=200/st,s=0;clearInterval(fTimer);fTimer=setInterval(function(){s++;audio.volume=v*(s/st);if(s>=st){clearInterval(fTimer);audio.volume=v}},tt)}

// Lyrics
var transLines=[],showTrans=true;
function loadLyric(song){S.lyricOff=0;transLines=[];api("/api/song/lyric?id="+song.id+"&source="+song.source,function(e,d){var lrc=(d&&(d.lrc||d.qrc))||"";var tlrc=(d&&d.tlrc)||"";if(!lrc.trim()&&song.source==="bl"){api("/api/song/lyric/search?title="+encodeURIComponent(song.title)+"&artist="+encodeURIComponent(song.artist),function(e2,d2){var l2=(d2&&(d2.lrc||d2.qrc))||"",t2=(d2&&d2.tlrc)||"";if(l2.trim()){S.lines=parseLrc(l2);transLines=parseLrc(t2);S.lyricIdx=-1;renderLrc();toast("已匹配歌词")}else showLrcEmpty()})}else if(lrc.trim()){S.lines=parseLrc(lrc);transLines=parseLrc(tlrc);S.lyricIdx=-1;renderLrc()}else showLrcEmpty()})}
function parseLrc(t){var ls=[],re=/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/g,m;while((m=re.exec(t))!==null){var ms=parseInt(m[3]);if(m[3].length===2)ms*=10;var tm=parseInt(m[1])*60+parseInt(m[2])+ms/1000;var c=m[4].trim();if(c)ls.push({time:tm,text:c})}ls.sort(function(a,b){return a.time-b.time});return ls}
function renderLrc(){var b=$("lyricBody");if(!S.lines.length){showLrcEmpty();return}var h="";S.lines.forEach(function(l,i){h+='<div class="lyric-line" data-index="'+i+'"><span class="text">'+esc(l.text)+'</span>';if(showTrans&&transLines.length){var tr=findTr(l.time);if(tr)h+='<div class="translation">'+esc(tr)+'</div>'}h+='</div>'});b.innerHTML=h}
function findTr(time){var best=null,bd=Infinity;for(var i=0;i<transLines.length;i++){var d=Math.abs(transLines[i].time-time);if(d<bd&&d<1){bd=d;best=transLines[i].text}}return best}
function showLrcEmpty(){$("lyricBody").innerHTML='<div class="lyric-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h12M4 18h8"/></svg><span>暂无歌词</span></div>'}
function updateLrc(time){var adj=time-S.lyricOff,idx=-1;for(var i=0;i<S.lines.length;i++){if(S.lines[i].time<=adj)idx=i;else break}if(idx===S.lyricIdx)return;S.lyricIdx=idx;document.querySelectorAll("#lyricBody .lyric-line").forEach(function(el,i){el.classList.toggle("active",i===idx)});if(idx>=0){var el=document.querySelector("#lyricBody .lyric-line[data-index='"+idx+"']");if(el)el.scrollIntoView({behavior:"smooth",block:"center"})}renderIL()}
function renderIL(){var tl=$("ilTitle"),al=$("ilArtist");if(S.song){tl.textContent=S.song.title;al.textContent=S.song.artist}}
function toggleTrans(){showTrans=!showTrans;renderLrc();var b=$("btnTranslation"),bf=$("ilTransBtn");if(b)b.style.color=showTrans?"var(--accent)":"";if(bf)bf.classList.toggle("active",showTrans);toast(showTrans?"显示翻译":"隐藏翻译")}
function adjustOff(d){S.lyricOff+=d;var ds=$("lyricOffsetDisplay");if(ds)ds.textContent=S.lyricOff.toFixed(1)+"s";toast("歌词偏移: "+S.lyricOff.toFixed(1)+"s")}

// Playlist
function loadPl(){api("/api/playlist",function(e,d){if(e)return;S.pl=d||[];$("playlistCount").textContent=S.pl.length;if(S.tab==="playlist")renderList(S.pl,"playlist")})}
function savePl(){postApi("/api/playlist",S.pl,function(e){if(e)toast("保存失败")})}
function addToPl(song){if(S.pl.some(function(s){return s.id===song.id&&s.source===song.source})){toast("已在歌单中");return}S.pl.push(song);savePl();$("playlistCount").textContent=S.pl.length;toast("已添加到歌单")}
function rmFromPl(i){S.pl.splice(i,1);savePl();$("playlistCount").textContent=S.pl.length;if(S.tab==="playlist")renderList(S.pl,"playlist");toast("已移除")}
function addRecent(song){S.recent=S.recent.filter(function(s){return!(s.id===song.id&&s.source===song.source)});S.recent.unshift(song);if(S.recent.length>50)S.recent=S.recent.slice(0,50);if(S.tab==="recent")renderList(S.recent,"recent")}

// Render
function renderList(songs,type){var c=$("trackList");if(!songs||!songs.length){showEmpty();return}var h="";songs.forEach(function(s,i){var playing=S.song&&S.song.id===s.id&&S.song.source===s.source;h+='<div class="track-row'+(playing?' playing':'')+'" data-index="'+i+'" data-type="'+type+'">';h+='<div class="tr-num">'+(playing?'<svg viewBox="0 0 24 24" fill="var(--accent)" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>':i+1)+'</div>';h+='<div><div class="tr-title">'+esc(s.title)+'</div><div class="tr-artist">'+esc(s.artist)+'</div></div>';h+='<span class="source-tag">'+SOURCE_LABELS[s.source]+'</span>';h+='<div class="tr-dur">'+(s.duration?fmt(s.duration):'')+'</div></div>'});c.innerHTML=h;c.querySelectorAll(".track-row").forEach(function(el){el.addEventListener("click",function(){var idx=parseInt(el.dataset.index),type=el.dataset.type;var list=type==="search"?S.results:type==="playlist"?S.pl:S.recent;if(list[idx])playSong(list[idx],idx,type)})})}
function showEmpty(){$("trackList").innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><div class="text">搜索你喜欢的音乐</div><div style="font-size:13px;opacity:.7">支持酷狗、网易云、B站三个平台</div></div>'}
function showLoading(){$("trackList").innerHTML='<div class="loading"><div class="spinner"></div><span>搜索中...</span></div>'}
function updatePlayBtn(){var ic=$("playIcon"),b=$("btnPlay"),fi=$("ilPlayIcon"),fb=$("ilPlayBtn");if(S.play){ic.innerHTML=ICON_PAUSE;b.classList.add("playing");if(fi)fi.innerHTML=ICON_PAUSE;if(fb)fb.classList.add("playing")}else{ic.innerHTML=ICON_PLAY;b.classList.remove("playing");if(fi)fi.innerHTML=ICON_PLAY;if(fb)fb.classList.remove("playing")}}
function updateProgress(){if(!audio.duration)return;if(isDrag)return;var p=(audio.currentTime/audio.duration)*100;$("progressFill").style.width=p+"%";$("timeDisplay").textContent=fmt(audio.currentTime)+" / "+fmt(audio.duration);var ilf=$("ilProgressFill");if(ilf)ilf.style.width=p+"%";updateLrc(audio.currentTime)}

// Waveform
var analyser,freqData,wInited=false;
function initWave(){if(wInited)return;try{var ac=new(window.AudioContext||window.webkitAudioContext)();ac.resume();analyser=ac.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.7;var src=ac.createMediaElementSource(audio);src.connect(analyser);analyser.connect(ac.destination);freqData=new Uint8Array(analyser.frequencyBinCount);wInited=true}catch(e){}}
var mwc,mwCtx;
function initMW(){mwc=$("mainWaveform");if(mwc)mwCtx=mwc.getContext("2d")}
function drawMW(){if(!mwc)return;if(!mwCtx)mwCtx=mwc.getContext("2d");var w=mwc.width=window.innerWidth,h=mwc.height=60;if(w<10)return;var ctx=mwCtx,t=Date.now()*.001;ctx.clearRect(0,0,w,h);var has=analyser&&freqData;if(has)analyser.getByteFrequencyData(freqData);var bc=100,bw=w/bc,bg=2;for(var i=0;i<bc;i++){var fv=0;if(has){var fi=Math.floor((i/bc)*freqData.length*.7);fv=freqData[fi]/255}else{fv=.03+Math.sin(i*.12+t*1.5)*.02+Math.sin(i*.08+t*.8)*.015}var bh=Math.max(2,fv*h*.85),x=i*bw+bg/2,y=h-bh;var gr=ctx.createLinearGradient(x,h,x,y);gr.addColorStop(0,"rgba(0,122,255,.06)");gr.addColorStop(.4,"rgba(0,122,255,.5)");gr.addColorStop(.7,"rgba(64,156,255,.75)");gr.addColorStop(1,"rgba(100,180,255,.9)");ctx.fillStyle=gr;ctx.fillRect(x,y,bw-bg,bh);if(fv>.1){ctx.beginPath();ctx.arc(x+(bw-bg)/2,y,1.5,0,6.28);ctx.fillStyle="rgba(128,200,255,"+fv*.6+")";ctx.fill()}}}

// IL Canvas
var ilCtx,ilCv;
function initIL(){ilCv=$("ilCanvas");if(ilCv)ilCtx=ilCv.getContext("2d")}
function drawIL(){
  if(!ilCtx||!S.lyricsOpen)return;
  var w=ilCv.width=ilCv.parentElement.clientWidth;
  var h=ilCv.height=ilCv.parentElement.clientHeight;
  if(w<10||h<10)return;
  var ctx=ilCtx,t=Date.now()*.001;
  ctx.clearRect(0,0,w,h);
  if(!S.lines.length)return;
  var allLines=S.lines,ci=S.lyricIdx;

  // ═══ 1. Audio visualizer — smooth bottom equalizer ═══
  if(analyser&&freqData){
    analyser.getByteFrequencyData(freqData);
    var bass=0;for(var i=0;i<8;i++)bass+=freqData[i];bass=bass/8/255;
    // Smooth equalizer bars
    var barCount=80;
    var barW=w/barCount;
    ctx.save();
    for(var i=0;i<barCount;i++){
      var fval=freqData[Math.floor((i/barCount)*64)]/255;
      var barH=Math.max(1,fval*h*0.25);
      var x=i*barW;
      var y=h-barH;
      var grad=ctx.createLinearGradient(x,h,x,y);
      grad.addColorStop(0,"rgba(0,122,255,0.03)");
      grad.addColorStop(0.5,"rgba(0,122,255,"+fval*0.2+")");
      grad.addColorStop(1,"rgba(80,180,255,"+fval*0.4+")");
      ctx.fillStyle=grad;
      ctx.globalAlpha=0.5+fval*0.5;
      ctx.fillRect(x+1,y,barW-2,barH);
    }
    ctx.restore();
    // Soft glow at bottom
    var glow=ctx.createLinearGradient(0,h,0,h-60);
    glow.addColorStop(0,"rgba(0,122,255,"+(0.04+bass*0.08)+")");
    glow.addColorStop(1,"rgba(0,122,255,0)");
    ctx.fillStyle=glow;ctx.fillRect(0,h-60,w,60);
  }

  // ═══ 2. Background lyrics as stars — ALL except nearest 2-3 to current ═══
  for(var i=0;i<allLines.length;i++){
    // Skip lines near current (within ±2)
    if(ci>=0&&Math.abs(i-ci)<=2)continue;
    // Position: deterministic pseudo-random, well spread
    var seed=i*7919;
    var px=(Math.sin(seed)*0.44+0.5)*w;
    var py=(Math.cos(seed*1.3)*0.42+0.5)*h;
    // Twinkle effect
    var twinkle=0.6+Math.sin(t*2+i*3.7)*0.4;
    // Size varies by seed
    var sizeSeed=Math.abs(Math.sin(seed*13));
    var fs=13+sizeSeed*16;
    // Alpha: base on twinkle, all stars visible
    var alpha=0.35*twinkle;
    if(alpha<0.02)continue;
    ctx.save();
    ctx.font=(sizeSeed>0.5?"600 ":"400 ")+fs+"px -apple-system,'PingFang SC',sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.globalAlpha=alpha;
    ctx.fillStyle="rgba(143,220,255,0.65)";
    ctx.shadowBlur=10;ctx.shadowColor="rgba(0,122,255,"+alpha*0.4+")";
    ctx.fillText(allLines[i].text,px,py);
    ctx.shadowBlur=0;ctx.restore();
  }

  // Sparkles
  for(var i=0;i<25;i++){
    var seed=i*3571;
    var sx=(Math.sin(seed+t*0.5)*0.48+0.5)*w;
    var sy=(Math.cos(seed*1.7+t*0.35)*0.45+0.5)*h;
    var sa=0.1+Math.sin(t*3+seed)*0.08;
    var sr=1.2+Math.sin(t*2+seed)*0.6;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,6.28);
    ctx.fillStyle="rgba(180,230,255,"+sa+")";ctx.fill();
  }

  // ═══ 3. Active lyric — smooth per-char ═══
  if(ci<0||ci>=allLines.length)return;
  var curLine=allLines[ci];
  var lineStart=curLine.time;
  var nextLine=allLines[ci+1];
  var lineEnd=nextLine?nextLine.time:(audio.duration||lineStart+5);
  var lineDur=lineEnd-lineStart;
  var charProg=0;
  if(lineDur>0)charProg=Math.max(0,Math.min(1,(audio.currentTime-S.lyricOff-lineStart)/lineDur));

  var text=curLine.text;
  var fontSize=Math.min(68,Math.max(32,w/(text.length*0.55)));
  ctx.save();ctx.font="700 "+fontSize+"px -apple-system,'PingFang SC',sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  var chars=text.split("");var widths=[];var totalW=0;
  for(var i=0;i<chars.length;i++){var cw=ctx.measureText(chars[i]).width;widths.push(cw);totalW+=cw}
  var startX=(w-totalW)/2;var x=startX;
  for(var i=0;i<chars.length;i++){
    var diff=charProg-(i/chars.length);
    var brightness;if(diff>=0)brightness=Math.max(0.15,1-diff*3);else brightness=Math.max(0.15,1+diff*2.5);
    brightness=Math.min(1,brightness);
    brightness=brightness*brightness*(3-2*brightness);
    ctx.save();
    var rr=Math.round(100+155*brightness);
    var gg=Math.round(190+65*brightness);
    ctx.fillStyle="rgba("+rr+","+gg+",255,"+(0.15+brightness*0.85)+")";
    ctx.shadowBlur=brightness*30;
    ctx.shadowColor="rgba(0,122,255,"+brightness*0.8+")";
    ctx.fillText(chars[i],x+widths[i]/2,h*.4);
    ctx.restore();x+=widths[i];
  }
  ctx.restore();

  // ═══ 4. Translation — per-char highlight ═══
  if(showTrans&&transLines.length){
    var trText=findTr(curLine.time);
    if(trText){
      var trFs=Math.min(22,Math.max(14,w/(trText.length*0.6)));
      ctx.save();ctx.font="400 "+trFs+"px -apple-system,'PingFang SC',sans-serif";
      ctx.textAlign="center";ctx.textBaseline="middle";
      var trChars=trText.split("");var trWidths=[];var trTotal=0;
      for(var i=0;i<trChars.length;i++){var tw=ctx.measureText(trChars[i]).width;trWidths.push(tw);trTotal+=tw}
      var trX=(w-trTotal)/2;
      for(var i=0;i<trChars.length;i++){
        var diff=charProg-(i/trChars.length);
        var br;if(diff>=0)br=Math.max(0.1,1-diff*3);else br=Math.max(0.1,1+diff*2.5);
        br=Math.min(1,br);br=br*br*(3-2*br);
        ctx.save();
        var rr=Math.round(100+155*br);var gg=Math.round(180+75*br);
        ctx.fillStyle="rgba("+rr+","+gg+",255,"+(0.1+br*0.6)+")";
        ctx.shadowBlur=br*15;ctx.shadowColor="rgba(0,122,255,"+br*0.5+")";
        ctx.fillText(trChars[i],trX+trWidths[i]/2,h*.4+fontSize*.7);
        ctx.restore();trX+=trWidths[i];
      }
      ctx.restore();
    }
  }

  // ═══ 5. Next line preview ═══
  if(ci+1<allLines.length){
    var nx=allLines[ci+1];
    ctx.save();ctx.font="400 "+Math.min(18,Math.max(13,w/(nx.text.length*0.7)))+"px -apple-system,'PingFang SC',sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.globalAlpha=0.12;ctx.fillStyle="rgba(168,246,255,0.5)";
    ctx.fillText(nx.text,w/2,h*.75);ctx.restore();
  }
}

// Controls
function cycleMode(){var i=MODE_ORDER.indexOf(S.mode);S.mode=MODE_ORDER[(i+1)%MODE_ORDER.length];toast(MODE_LABELS[S.mode]);$("btnMode").innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+MODE_ICONS[S.mode]+'</svg>'}
function setSpeed(s){S.speed=s;audio.playbackRate=s;$("speedBadge").textContent=s+"x";$("speedBadge").classList.toggle("active",s!==1);$("speedMenu").classList.remove("show")}
function toggleSpeed(){var m=$("speedMenu"),b=$("speedBadge"),r=b.getBoundingClientRect();m.style.left=r.left+"px";m.style.bottom=(window.innerHeight-r.top+8)+"px";m.style.top="auto";m.classList.toggle("show")}
function setVol(v){audio.volume=v;$("volumeSlider").value=v*100;S.muted=v===0;updateVolIcon()}
function toggleMute(){if(S.muted){setVol(S.prevVol||0.8)}else{S.prevVol=audio.volume;setVol(0)}}
function updateVolIcon(){var i=$("volumeIcon");if(S.muted||audio.volume===0){i.classList.add("muted");i.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'}else{i.classList.remove("muted");i.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>'}}

// Progress
var isDrag=false,wasP=false;
function onPD(e){isDrag=true;wasP=!audio.paused;audio.pause();seekTo(e);$("progressBar").classList.add("dragging")}
function onPM(e){if(!isDrag)return;seekTo(e);var p=getPct(e);$("timeDisplay").textContent=fmt(p*(audio.duration||0))+" / "+fmt(audio.duration)}
function onPU(){if(!isDrag)return;isDrag=false;if(wasP)audio.play();$("progressBar").classList.remove("dragging")}
function getPct(e){var b=$("progressBar"),r=b.getBoundingClientRect();return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))}
function seekTo(e){var p=getPct(e);if(audio.duration)audio.currentTime=p*audio.duration}

// Lyrics fullscreen
function openLyrics(){S.lyricsOpen=true;var il=$("immersiveLyrics");if(S.song){$("ilTitle").textContent=S.song.title;$("ilArtist").textContent=S.song.artist;var bg=$("ilBg");if(S.song.cover)bg.style.backgroundImage="url("+S.song.cover+")";else bg.style.backgroundImage="none"}renderIL();il.classList.add("show");if(!ilCv)initIL();setTimeout(function(){if(ilCv){ilCv.width=ilCv.parentElement.clientWidth;ilCv.height=ilCv.parentElement.clientHeight}},100)}
function closeLyrics(){S.lyricsOpen=false;$("immersiveLyrics").classList.remove("show")}
function toggleLyricPanel(){S.lyricVis=!S.lyricVis;$("lyricPanel").style.display=S.lyricVis?"flex":"none";var b=$("btnLyric");if(b)b.classList.toggle("active",S.lyricVis)}

// Tabs
function switchTab(t){S.tab=t;document.querySelectorAll(".nav-item[data-tab]").forEach(function(el){el.classList.toggle("active",el.dataset.tab===t)});switch(t){case "search":$("pageTitle").textContent="搜索音乐";$("pageSub").textContent="搜索你喜欢的音乐";var kw=$("searchInput").value;if(kw)search(kw);else renderHist();break;case "playlist":$("pageTitle").textContent="我的歌单";$("pageSub").textContent=S.pl.length+" 首歌曲";renderList(S.pl,"playlist");break;case "recent":$("pageTitle").textContent="最近播放";$("pageSub").textContent=S.recent.length+" 首歌曲";renderList(S.recent,"recent");break}}
function filterSrc(s){S.src=s;document.querySelectorAll(".source-pill").forEach(function(el){el.classList.toggle("active",el.dataset.source===s)});var kw=$("searchInput").value;if(kw&&S.tab==="search")search(kw)}

// Animation loop
function animLoop(){if(S.play&&audio.duration)updateLyricProgress();drawMW();if(S.lyricsOpen)drawIL();requestAnimationFrame(animLoop)}
function updateLyricProgress(){if(S.lyricIdx<0||!S.lines.length)return;var cur=S.lines[S.lyricIdx],nx=S.lines[S.lyricIdx+1];var dur=nx?(nx.time-cur.time):((audio.duration||0)-cur.time);if(dur<=0)dur=1;var el=(audio.currentTime-S.lyricOff-cur.time)/dur*100;el=Math.max(0,Math.min(100,el));var side=document.querySelector("#lyricBody .lyric-line.active .text");if(side)side.style.setProperty("--progress",el+"%")}
requestAnimationFrame(animLoop);

// Init
function init(){
  initTheme();initMW();
  $("searchInput").addEventListener("input",function(e){clearTimeout(sTimer);sTimer=setTimeout(function(){if(S.tab==="search"){if(e.target.value.trim())search(e.target.value);else renderHist()}},300)});
  $("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&e.target.value.trim()){addHist(e.target.value.trim());search(e.target.value)}});
  $("searchInput").addEventListener("focus",function(){if(!this.value.trim()&&S.tab==="search")renderHist()});
  document.querySelectorAll(".nav-item[data-tab]").forEach(function(el){el.addEventListener("click",function(){switchTab(el.dataset.tab)})});
  document.querySelectorAll(".source-pill").forEach(function(el){el.addEventListener("click",function(e){e.preventDefault();filterSrc(el.dataset.source)})});
  $("songInfoArea").addEventListener("click",function(){openLyrics()});
  audio.addEventListener("timeupdate",updateProgress);
  audio.addEventListener("ended",function(){if(S.mode==="single"){audio.currentTime=0;audio.play()}else playNext()});
  audio.addEventListener("error",function(){toast("播放出错");S.play=false;updatePlayBtn()});
  $("progressBar").addEventListener("mousedown",onPD);
  document.addEventListener("mousemove",onPM);
  document.addEventListener("mouseup",onPU);
  $("ilProgress").addEventListener("mousedown",function(e){isDrag=true;wasP=!audio.paused;audio.pause();seekTo(e)});
  $("volumeSlider").addEventListener("input",function(e){setVol(e.target.value/100)});
  document.addEventListener("click",function(e){if(!e.target.closest("#speedMenu")&&!e.target.closest("#speedBadge"))$("speedMenu").classList.remove("show")});
  document.addEventListener("keydown",function(e){if(e.target.tagName==="INPUT")return;switch(e.key){case " ":e.preventDefault();togglePlay();break;case "ArrowLeft":if(e.ctrlKey)playPrev();else skip(-5);break;case "ArrowRight":if(e.ctrlKey)playNext();else skip(5);break;case "ArrowUp":e.preventDefault();setVol(Math.min(1,audio.volume+.1));break;case "ArrowDown":e.preventDefault();setVol(Math.max(0,audio.volume-.1));break;case "m":case "M":toggleMute();break;case "l":case "L":toggleLyricPanel();break;case "f":case "F":if(S.lyricsOpen)closeLyrics();else openLyrics();break;case "Escape":closeLyrics();break}});
  loadPl();
  $("btnMode").innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+MODE_ICONS[S.mode]+'</svg>'
}

window.App={toggle:togglePlay,prev:playPrev,next:playNext,skip:skip,cycleMode:cycleMode,setSpeed:setSpeed,toggleSpeedMenu:toggleSpeed,toggleMute:toggleMute,toggleLyricPanel:toggleLyricPanel,openLyrics:openLyrics,closeLyrics:closeLyrics,toggleTranslation:toggleTrans,adjustLyricOffset:adjustOff,toggleTheme:toggleTheme,searchHist:function(k){$("searchInput").value=k;search(k)},clearHist:function(){localStorage.removeItem("melody_sh");renderHist()},addToPlaylist:function(i){var l=curList();if(l[i])addToPl(l[i])},removeFromPlaylist:rmFromPl};
init();
</script>
</body>
