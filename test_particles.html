<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Particle Text Test</title>
<style>
* { margin:0; padding:0; }
body { background:#060a14; overflow:hidden; }
canvas { display:block; }
#info { position:fixed; top:20px; left:20px; color:rgba(255,255,255,.5); font:14px sans-serif; }
#info span { color:#0A84FF; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">当前歌词: <span id="cur">--</span></div>
<script>
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();window.onresize=resize;

var lyrics=[
  "从前从前 有个人爱你很久",
  "但偏偏 风渐渐 把距离吹得好远",
  "好不容易 又能再多爱一天",
  "但故事的最后 你好像还是说了拜拜",
  "为你翘课的那一天 花落的那一天",
  "教室的那一间 我怎么看不见"
];
var currentIdx=0,lastIdx=-1;
var particles=[];
var PCOUNT=500;
var CONVERGE=0.065;
var t=0;

function sampleText(text){
  var c=document.createElement("canvas"),cx=c.getContext("2d");
  var fs=Math.min(72,Math.max(32,Math.floor(W/(text.length*0.9))));
  c.width=W;c.height=H;
  cx.fillStyle="#fff";cx.font="800 "+fs+"px -apple-system,'PingFang SC',sans-serif";
  cx.textAlign="center";cx.textBaseline="middle";cx.fillText(text,W/2,H/2);
  var data=cx.getImageData(0,0,W,H).data,pts=[];
  for(var y=0;y<H;y+=4){for(var x=0;x<W;x+=4){if(data[(y*W+x)*4+3]>100)pts.push({x:x,y:y});}}
  return pts;
}

function makeParticle(tx,ty,fromEdge){
  var sx,sy;
  if(fromEdge){
    var angle=Math.random()*Math.PI*2;
    var dist=Math.max(W,H)*0.6+Math.random()*200;
    sx=W/2+Math.cos(angle)*dist;sy=H/2+Math.sin(angle)*dist;
  }else{sx=Math.random()*W;sy=Math.random()*H;}
  return{x:sx,y:sy,tx:tx,ty:ty,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
    r:Math.random()*2.5+0.8,phase:Math.random()*Math.PI*2,arrived:false,
    color:Math.random()>0.4?"rgba(10,132,255,":"rgba(80,170,255,"
  };
}

function updateLyric(){
  var text=lyrics[currentIdx];
  document.getElementById("cur").textContent=text;
  var positions=sampleText(text);
  var newP=[];var maxP=Math.min(positions.length,PCOUNT);
  var step=Math.max(1,Math.floor(positions.length/maxP));
  for(var i=0;i<positions.length&&newP.length<maxP;i+=step){
    newP.push(makeParticle(positions[i].x,positions[i].y,true));
  }
  particles=newP;
}

function draw(){
  t+=0.016;
  ctx.clearRect(0,0,W,H);

  // bg glow
  var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.5);
  bg.addColorStop(0,"rgba(10,20,40,0.3)");bg.addColorStop(1,"rgba(6,10,20,0.1)");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // check lyric change
  if(currentIdx!==lastIdx){lastIdx=currentIdx;updateLyric();}

  // particles
  ctx.save();
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var dx=p.tx-p.x,dy=p.ty-p.y;var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1.5){p.vx+=dx*CONVERGE;p.vy+=dy*CONVERGE;}
    p.vx*=0.85;p.vy*=0.85;
    p.x+=p.vx+Math.sin(t*2.5+p.phase)*0.3;
    p.y+=p.vy+Math.cos(t*2+p.phase)*0.3;
    if(dist<2&&!p.arrived)p.arrived=true;
    var alpha=p.arrived?(0.75+Math.sin(t*2+p.phase)*0.15):0.35;
    var sz=p.r*(p.arrived?1:0.6);
    ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);
    ctx.fillStyle=p.color+alpha+")";
    ctx.shadowBlur=p.arrived?8:3;ctx.shadowColor=p.color+alpha*0.4+")";
    ctx.fill();
  }
  // connections
  ctx.lineWidth=0.2;ctx.shadowBlur=0;
  for(var i=0;i<particles.length;i+=3){
    if(!particles[i].arrived)continue;
    for(var j=i+3;j<Math.min(i+15,particles.length);j+=2){
      if(!particles[j].arrived)continue;
      var dxx=particles[i].x-particles[j].x;var dyy=particles[i].y-particles[j].y;
      var dd=Math.sqrt(dxx*dxx+dyy*dyy);
      if(dd<18){var la=(1-dd/18)*0.12;if(la>0.004){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle="rgba(80,170,255,"+la+")";ctx.stroke();}}}}
  ctx.restore();ctx.shadowBlur=0;
  requestAnimationFrame(draw);
}

// 每3秒切换歌词
setInterval(function(){currentIdx=(currentIdx+1)%lyrics.length;},3000);
draw();
</script>
</body>
</html>
